<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOTradeAI - Create Account</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0e27;
            --bg-card: #1a1f3a;
            --text-primary: #ffffff;
            --text-secondary: #a0a6c0;
            --accent-blue: #4a9eff;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --border-color: #2d3354;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, #0f1435 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
        }
        .auth-container { width: 100%; max-width: 480px; padding: 20px; }
        .auth-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 36px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        .brand { text-align: center; margin-bottom: 28px; }
        .brand-logo { font-size: 36px; margin-bottom: 6px; }
        .brand-name {
            font-size: 26px; font-weight: 800;
            background: linear-gradient(135deg, var(--accent-blue), #8b5cf6);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .brand-tagline { color: var(--text-secondary); font-size: 13px; margin-top: 4px; }
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block; font-size: 13px; font-weight: 600;
            color: var(--text-secondary); margin-bottom: 5px;
        }
        .form-group input {
            width: 100%; padding: 11px 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 10px; color: var(--text-primary);
            font-size: 14px; font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-group input:focus {
            outline: none; border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(74, 158, 255, 0.15);
        }
        .form-group input::placeholder { color: #5a6080; }
        .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-primary {
            width: 100%; padding: 13px; margin-top: 8px;
            background: linear-gradient(135deg, var(--accent-green), #059669);
            color: white; border: none; border-radius: 10px;
            font-size: 15px; font-weight: 700; font-family: inherit;
            cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(16, 185, 129, 0.4);
        }
        .auth-footer {
            text-align: center; margin-top: 20px;
            font-size: 14px; color: var(--text-secondary);
        }
        .auth-footer a { color: var(--accent-blue); text-decoration: none; font-weight: 600; }
        .auth-footer a:hover { text-decoration: underline; }
        .flash-messages { margin-bottom: 16px; }
        .flash-msg {
            padding: 10px 14px; border-radius: 8px;
            font-size: 13px; margin-bottom: 6px;
        }
        .flash-msg.error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3); color: #fca5a5;
        }
        .flash-msg.success {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.3); color: #6ee7b7;
        }
        .pwd-hint {
            font-size: 11px; color: var(--text-secondary);
            margin-top: 4px;
        }
        .required-star { color: var(--accent-red); }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="brand">
                <div class="brand-logo">🤖📈</div>
                <div class="brand-name">BOTradeAI</div>
                <div class="brand-tagline">Create your trading account</div>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            <div class="flash-messages">
                {% for category, message in messages %}
                <div class="flash-msg {{ category }}">{{ message }}</div>
                {% endfor %}
            </div>
            {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('auth.register') }}">
                <div class="form-row-2">
                    <div class="form-group">
                        <label>First Name <span class="required-star">*</span></label>
                        <input type="text" name="first_name" placeholder="John"
                               value="{{ first_name|default('') }}" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name <span class="required-star">*</span></label>
                        <input type="text" name="last_name" placeholder="Doe"
                               value="{{ last_name|default('') }}" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Email Address <span class="required-star">*</span></label>
                    <input type="email" name="email" placeholder="you@example.com"
                           value="{{ email|default('') }}" required>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" name="phone" placeholder="+1 (555) 123-4567"
                           value="{{ phone|default('') }}">
                </div>
                <div class="form-group">
                    <label>Password <span class="required-star">*</span></label>
                    <input type="password" name="password" placeholder="Create a strong password" required>
                    <div class="pwd-hint">Min 8 chars, 1 uppercase, 1 lowercase, 1 number</div>
                </div>
                <div class="form-group">
                    <label>Confirm Password <span class="required-star">*</span></label>
                    <input type="password" name="confirm_password" placeholder="Re-enter your password" required>
                </div>
                <button type="submit" class="btn-primary">Create Account</button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a>
            </div>
        </div>
    </div>
</body>
</html>
