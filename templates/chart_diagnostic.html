<!DOCTYPE html>
<html>
<head>
    <title>Chart Diagnostic</title>
    <script src="/static/js/lightweight-charts.js"></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #1a1a1a;
            color: white;
            font-family: monospace;
        }
        #chart {
            width: 100%;
            height: 500px;
            background: #2a2a2a;
            margin: 20px 0;
            border: 2px solid #00ff00;
        }
        .log {
            background: #2a2a2a;
            padding: 10px;
            margin: 10px 0;
            border-left: 3px solid #00ff00;
        }
        .error {
            border-left-color: #ff0000;
            color: #ff6666;
        }
    </style>
</head>
<body>
    <h1>Chart Diagnostic Tool</h1>
    <div id="logs"></div>
    <div id="chart"></div>
    
    <script>
        function log(msg, isError = false) {
            const div = document.createElement('div');
            div.className = 'log' + (isError ? ' error' : '');
            div.textContent = new Date().toLocaleTimeString() + ' - ' + msg;
            document.getElementById('logs').appendChild(div);
            console.log(msg);
        }
        
        log('Starting diagnostic...');
        
        // Check library
        if (typeof LightweightCharts === 'undefined') {
            log('ERROR: LightweightCharts is not loaded!', true);
        } else {
            log('✅ LightweightCharts is loaded');
            log('Version: ' + (LightweightCharts.version || 'unknown'));
        }
        
        // Check DOM
        window.addEventListener('DOMContentLoaded', function() {
            log('DOM loaded');
            
            const chartDiv = document.getElementById('chart');
            log('Chart div found: ' + (chartDiv !== null));
            log('Chart div dimensions: ' + chartDiv.clientWidth + 'x' + chartDiv.clientHeight);
            
            if (!chartDiv) {
                log('ERROR: Chart div not found!', true);
                return;
            }
            
            if (typeof LightweightCharts === 'undefined') {
                log('ERROR: Cannot create chart - library not loaded', true);
                return;
            }
            
            try {
                log('Creating chart...');
                const chart = LightweightCharts.createChart(chartDiv, {
                    width: chartDiv.clientWidth,
                    height: 500,
                    layout: {
                        backgroundColor: '#1a1a1a',
                        textColor: '#d1d4dc',
                    },
                });
                
                log('✅ Chart object created');
                
                log('Adding candlestick series...');
                const candlestickSeries = chart.addCandlestickSeries({
                    upColor: '#26a69a',
                    downColor: '#ef5350',
                    borderVisible: false,
                    wickUpColor: '#26a69a',
                    wickDownColor: '#ef5350',
                });
                
                log('✅ Series created');
                
                // Test data
                const data = [
                    { time: '2024-01-01', open: 100, high: 110, low: 95, close: 105 },
                    { time: '2024-01-02', open: 105, high: 115, low: 100, close: 110 },
                    { time: '2024-01-03', open: 110, high: 120, low: 105, close: 115 },
                    { time: '2024-01-04', open: 115, high: 125, low: 110, close: 120 },
                    { time: '2024-01-05', open: 120, high: 130, low: 115, close: 125 },
                ];
                
                log('Setting data (' + data.length + ' candles)...');
                candlestickSeries.setData(data);
                log('✅ Data set');
                
                log('Fitting content...');
                chart.timeScale().fitContent();
                log('✅ Content fitted');
                
                log('SUCCESS! Chart should be visible now');
                
            } catch (error) {
                log('ERROR: ' + error.message, true);
                log('Stack: ' + error.stack, true);
            }
        });
    </script>
</body>
</html>
