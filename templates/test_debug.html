<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Debug Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #1e1e1e;
            color: #fff;
        }
        .test-item {
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #444;
            border-radius: 5px;
        }
        .pass { background: #1a4d2e; }
        .fail { background: #4d1a1a; }
        .info { background: #1a3a4d; }
        pre {
            background: #000;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
        }
    </style>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>
<body>
    <h1>🔍 Trading Dashboard - Debug Test Page</h1>
    <p>This page will help diagnose loading issues</p>
    
    <div id="test-results"></div>
    
    <h2>Console Output:</h2>
    <pre id="console-output"></pre>
    
    <script src="{{ url_for('static', filename='js/dashboard.js') }}?v=4.0"></script>
    <script>
        const results = document.getElementById('test-results');
        const consoleOutput = document.getElementById('console-output');
        let logs = [];
        
        // Intercept console.log
        const originalLog = console.log;
        console.log = function(...args) {
            originalLog.apply(console, args);
            logs.push(args.join(' '));
            consoleOutput.textContent = logs.join('\n');
        };
        
        const originalError = console.error;
        console.error = function(...args) {
            originalError.apply(console, args);
            logs.push('❌ ERROR: ' + args.join(' '));
            consoleOutput.textContent = logs.join('\n');
        };
        
        function addTest(name, passed, details = '') {
            const div = document.createElement('div');
            div.className = `test-item ${passed ? 'pass' : 'fail'}`;
            div.innerHTML = `
                <strong>${passed ? '✅' : '❌'} ${name}</strong>
                ${details ? `<br><small>${details}</small>` : ''}
            `;
            results.appendChild(div);
        }
        
        // Run tests
        console.log('='.repeat(80));
        console.log('🔍 STARTING DEBUG TESTS');
        console.log('='.repeat(80));
        
        // Test 1: Socket.IO
        addTest('Socket.IO Library Loaded', typeof io !== 'undefined', `io type: ${typeof io}`);
        console.log('✅ Socket.IO available:', typeof io !== 'undefined');
        
        // Test 2: TradingDashboard class
        addTest('TradingDashboard Class Available', typeof TradingDashboard !== 'undefined', 
                `TradingDashboard type: ${typeof TradingDashboard}`);
        console.log('✅ TradingDashboard class:', typeof TradingDashboard !== 'undefined');
        
        // Test 3: Try to create instance
        try {
            console.log('🔄 Creating TradingDashboard instance with autoInit=false...');
            const testDashboard = new TradingDashboard(false);
            addTest('Dashboard Instance Created', true, `Instance: ${!!testDashboard}`);
            console.log('✅ Dashboard instance created successfully');
            
            // Test 4: Check methods exist
            const methods = ['loadMarketOverview', 'loadActivePositions', 'connectWebSocket', 'loadDashboardData'];
            methods.forEach(method => {
                const exists = typeof testDashboard[method] === 'function';
                addTest(`Method: ${method}`, exists);
                console.log(`${exists ? '✅' : '❌'} Method ${method}:`, exists);
            });
            
            // Test 5: Check socket
            addTest('WebSocket Initialized', !!testDashboard.socket, `Socket: ${!!testDashboard.socket}`);
            console.log('✅ WebSocket object:', !!testDashboard.socket);
            
        } catch (error) {
            addTest('Dashboard Instance Created', false, `Error: ${error.message}`);
            console.error('❌ Failed to create dashboard:', error);
        }
        
        // Test 6: Try API call
        console.log('🔄 Testing API endpoint /api/market/overview...');
        fetch('/api/market/overview')
            .then(response => {
                console.log('✅ API Response status:', response.status);
                addTest('API Endpoint /api/market/overview', response.status === 200, 
                        `Status: ${response.status}`);
                return response.json();
            })
            .then(data => {
                console.log('✅ API Response data:', data);
                addTest('API Returns JSON', true, `Success: ${data.success}`);
            })
            .catch(error => {
                console.error('❌ API Error:', error);
                addTest('API Endpoint /api/market/overview', false, `Error: ${error.message}`);
            });
        
        console.log('='.repeat(80));
        console.log('🏁 DEBUG TESTS COMPLETE');
        console.log('='.repeat(80));
    </script>
</body>
</html>
